subtitle = "Value prediction for industrial decision systems"
date = "2025 - Present"
content = "Modeling long-horizon user value and confirmed transaction value under delayed labels and changing product conditions. For example, a useful forecasting system should not only reduce aggregate error, but also remain reliable for high-value cohorts and decision-sensitive scenarios."
